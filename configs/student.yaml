seed: 289
device: auto
torch_num_threads: 1

model:
  hidden_dim: 256
  num_layers: 3
  use_gru: true
  delta_limit: 5.0          # match model.py default

training:
  batch_size: 128
  updates: 20000            # was 12000 — more training with LR decay matters
  smoke_updates: 120
  train_sequence_length: 256
  learning_rate: 1.0e-4     # higher initial LR; cosine decay will bring it down
  grad_clip_norm: 1.0        # tighter clipping (was 5.0) — GRUs destabilize with large grads
  eval_every: 200
  smoke_eval_every: 20
  val_horizon: 500
  max_val_windows: 128
  checkpoint_metric: val/VPT80@0.25
  checkpoint_mode: max

loss:
  one_step_weight: 0.5    # balanced — rollout is now doing the heavy lifting
  rollout_weight: 5.0        # was 2.0; horizon-weighted rollout deserves more weight
  rollout_train_horizon: 120  # match val_horizon target; warmup=10 → needs seq_len≥91 ✓

eval:
  warmup_steps: 10
  horizon: auto
  max_horizon: 1000
  report_horizons: [1, 5, 10, 90, 100, 200, 500, 1000]
  vpt_thresholds: [0.10, 0.25, 0.50]
