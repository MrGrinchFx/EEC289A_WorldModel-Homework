seed: 289
device: auto
torch_num_threads: 1

model:
  hidden_dim: 256
  num_layers: 3
  use_gru: true
  delta_limit: 5.0          # match model.py default

training:
  batch_size: 128
  updates: 50000            
  smoke_updates: 120
  train_sequence_length: 256
  learning_rate: 1.0e-5     # Changed to a stable constant LR (standard Adam default)
  grad_clip_norm: 5.0       # Relaxed clipping since BPTT is now working properly
  eval_every: 200
  smoke_eval_every: 20
  val_horizon: 500
  max_val_windows: 128
  checkpoint_metric: val/VPT80@0.25
  checkpoint_mode: max

loss:
  one_step_weight: 1.0    
  rollout_weight: 0.1       # Reduced from 4.0 to let 1-step learning stabilize first
  rollout_train_horizon: 40 # Reduced from 90 to 10 for stable initial dynamics learning

eval:
  warmup_steps: 10
  horizon: auto
  max_horizon: 1000
  report_horizons: [1, 5, 10, 90, 100, 200, 500, 1000]
  vpt_thresholds: [0.10, 0.25, 0.50]
