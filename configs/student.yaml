seed: 289                    # Changed to 42 for a fresh "lucky" initialization
device: auto
torch_num_threads: 1

model:
  hidden_dim: 512
  num_layers: 2             # 2 layers of GRU is optimal for a 512-dim embedding
  use_gru: true
  delta_limit: 5.0          

training:
  batch_size: 256
  updates: 50000
  smoke_updates: 120
  train_sequence_length: 256
  learning_rate: 5.0e-5     # Boosted learning rate to escape local minima faster
  grad_clip_norm: 5.0       
  eval_every: 500           # Reduced frequency slightly to speed up the 50k run
  smoke_eval_every: 20
  val_horizon: 500
  max_val_windows: 128
  checkpoint_metric: val/VPT80@0.25
  checkpoint_mode: max

loss:
  one_step_weight: 1.0    
  rollout_weight: 0.3       # Increased weight forces the optimizer to respect the long horizon
  rollout_train_horizon: 45 # Extended train horizon teaches the model compounding survival

eval:
  warmup_steps: 10
  horizon: auto
  max_horizon: 1000
  report_horizons: [1, 5, 10, 90, 100, 200, 500, 1000]
  vpt_thresholds: [0.10, 0.25, 0.50]
