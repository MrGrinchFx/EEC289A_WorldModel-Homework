seed: 289                    # Changed to 42 for a fresh "lucky" initialization
device: auto
torch_num_threads: 1

model:
  hidden_dim: 256           # Scaled down to prevent parameter thrashing
  num_layers: 2
  use_gru: true
  delta_limit: 5.0          

training:
  batch_size: 256
  updates: 50000
  smoke_updates: 120
  train_sequence_length: 256
  learning_rate: 3.0e-5       # Clean middle-ground LR
  grad_clip_norm: 1.0
  eval_every: 500
  smoke_eval_every: 20
  val_horizon: 500
  max_val_windows: 128
  checkpoint_metric: val/VPT80@0.25
  checkpoint_mode: max

loss:
  one_step_weight: 1.0    
  rollout_weight: 0.25      # Lowered to prevent rollout from bullying the one-step loss
  rollout_train_horizon: 15 # Shrink the horizon to a manageable length early in training

eval:
  warmup_steps: 10
  horizon: auto
  max_horizon: 1000
  report_horizons: [1, 5, 10, 90, 100, 200, 500, 1000]
  vpt_thresholds: [0.10, 0.25, 0.50]
